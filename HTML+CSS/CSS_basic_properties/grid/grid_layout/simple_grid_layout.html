<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Grid Layout</title>
    <link rel="stylesheet" href="./simple_grid_layout.css">
</head>
<body>
    <div id="main-container">
        <div id="grid-container-1">
            <div class="child-container"></div>
            <div class="child-container"></div>
            <div class="child-container"></div>
            <div class="child-container"></div>
            <div class="child-container"></div>
            <div class="child-container"></div>
        </div>

        <hr>

        <div id="grid-container-2">
            <div id="div-1" class="child-container">First</div>
            <div id="div-2" class="child-container">second</div>
            <div id="div-3" class="child-container">Third</div>
            <div id="div-4" class="child-container">Fourth</div>
            <div id="div-5" class="child-container">Fifth</div>
            <div id="div-6" class="child-container">Sixth</div>
        </div>
    </div>
</body>
</html>
