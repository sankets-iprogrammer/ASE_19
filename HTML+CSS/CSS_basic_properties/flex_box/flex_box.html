<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        Flex Box
    </title>
    <link rel="stylesheet" href="./flex_box.css">

</head>

<body>
    <div class="main-container1">
        <div class="child-container">1</div>
        <div class="child-container">2</div>
        <div class="child-container">3</div>
        <div class="child-container">4</div>
        <div class="child-container">5</div>
    </div>
    <hr>
    <div class="main-container1 dir-col">
        <div class="child-container">1</div>
        <div class="child-container">2</div>
        <div class="child-container">3</div>
        <div class="child-container">4</div>
        <div class="child-container">5</div>
    </div>
    <hr>
    <div class="main-container1 space-around">
        <div class="child-container">1</div>
        <div class="child-container">2</div>
        <div class="child-container">3</div>
        <div class="child-container">4</div>
        <div class="child-container">5</div>
    </div>
    <hr>
    <div class="main-container1 space-between">
        <div class="child-container">1</div>
        <div class="child-container">2</div>
        <div class="child-container">3</div>
        <div class="child-container">4</div>
        <div class="child-container">5</div>
    </div>
    <hr>
    <div class="main-container1 just-center">
        <div class="child-container">1</div>
        <div class="child-container">2</div>
        <div class="child-container">3</div>
        <div class="child-container">4</div>
        <div class="child-container">5</div>
    </div>
    <hr>
    <div class="main-container1 just-center">
        <div class="child-container2">1</div>
        <div class="child-container2">2</div>
        <div class="child-container2">3</div>
        <div class="child-container2">4</div>
        <div class="child-container2">5</div>
        <div class="child-container2">1</div>
        <div class="child-container2">2</div>
        <div class="child-container2">3</div>
        <div class="child-container2">4</div>
        <div class="child-container2">5</div>
    </div>
    <hr>
    <div class="main-container1 space-around wrap">
        <div class="child-container2">1</div>
        <div class="child-container2">2</div>
        <div class="child-container2">3</div>
        <div class="child-container2">4</div>
        <div class="child-container2">5</div>
        <div class="child-container2">1</div>
        <div class="child-container2">2</div>
        <div class="child-container2">3</div>
        <div class="child-container2">4</div>
        <div class="child-container2">5</div>
    </div>
    <hr>
    <div class="main-container-fixed" > 
        <div class="child-container">1</div>
        <div class="child-container">2</div>
        <div class="child-container">3</div>
        <div class="child-container">4</div>
        <div class="child-container">5</div>
    </div>
     <hr>
    <div class="main-container-fixed ali-center" > 
        <div class="child-container">1</div>
        <div class="child-container">2</div>
        <div class="child-container">3</div>
        <div class="child-container">4</div>
        <div class="child-container">5</div>
    </div>
</body>

</html>
