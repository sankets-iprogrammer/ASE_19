<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./simple_form.css">
</head>
<body>
    <table>
        <tr>
            <th colspan="5" class="table-header">Registration Form</th>
        </tr>
        <tr>
            <td colspan="2" class="input-header">Student's Name</th>
            <td colspan="3" class="input-desc">
                <input class="text-input" type="text" name="" id="">
            </td>
        </tr>
        <tr>
            <td colspan="2" class="input-header">Father's Name</th>
            <td colspan="3" class="input-desc">
                <input class="text-input" type="text" name="" id="">
            </td>
        </tr>
        <tr>
            <td colspan="2" class="input-header">Mother's Name</th>
            <td colspan="3" class="input-desc">
                <input class="text-input" type="text" name="" id="">
            </td>
        </tr>
        <tr>
            <td colspan="2" class="input-header">Date of Birth</th>
            <td colspan="3" class="input-desc">
                <input class="text-input" type="date" name="" id="">
            </td>
        </tr>
        <tr>
            <td colspan="2" class="input-header">Gender</th>
            <td colspan="3" class="input-desc">
                <label for="gender-male">male</label>
                <input name="gender-male" class="text-input" type="radio" name="" id="">
                <label for="gender-female">female</label>
                <input name="gender-female" class="text-input" type="radio" name="" id="">
            </td>
        </tr>
        <tr>
            <td colspan="2" class="input-header">Email ID</th>
            <td colspan="3" class="input-desc">
                <input class="text-input" type="text" name="" id="">
            </td>
        </tr>
        <tr>
            <td colspan="2" class="input-header">Mobile No.</th>
            <td colspan="3" class="input-desc">
                <input class="text-input" type="text" name="" id="">
            </td>
        </tr>
        <tr>
            <td colspan="2" class="input-header">Address</th>
            <td colspan="3" class="input-desc">
                <textarea name="" id=""></textarea>
            </td>
        </tr>
        <tr>
            <td colspan="2" class="input-header">State</th>
            <td colspan="3" class="input-desc">
                <input class="text-input" type="text" name="" id="">
            </td>
        </tr>
        <tr>
            <td colspan="2" class="input-header">City</th>
            <td colspan="3" class="input-desc">
                <input class="text-input" type="text" name="" id="">
            </td>
        </tr>
        <tr>
            <td colspan="2" class="input-header"></th>
            <td colspan="3" class="input-desc">
                <input class="text-input" type="submit" name="" id="">
            </td>
        </tr>
    </table>
</body>
</html>
